<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/main.css" />
    <script type="module" src="main.ts"></script>
    <title>IIDX Infinitas Chart Database</title>
  </head>
  <body>
    <div id="app">
      <header id="site-header">
        <div class="header-copy">
          <span class="site-kicker">Beatmania IIDX Infinitas</span>
          <h1>IIDX Infinitas Chart Database</h1>
        </div>
        <div class="header-links">
          <a
            class="sister-site-link"
            href="https://sdvx.directory"
            target="_blank"
            rel="noopener"
          >
            SDVX.directory
          </a>
          <a
            class="github-link"
            href="https://github.com/vanhavel/iidx-db"
            target="_blank"
            rel="noopener"
            aria-label="GitHub repository"
          >
            <svg
              viewBox="0 0 16 16"
              width="20"
              height="20"
              aria-hidden="true"
              fill="currentColor"
            >
              <path
                d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2
                0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95
                0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12
                0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68
                0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44
                1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82
                2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51
                1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82
                1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01
                1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0
                8c0-4.42 3.58-8 8-8Z"
              ></path>
            </svg>
          </a>
        </div>
      </header>

      <section id="searchParams" class="search-panel" aria-labelledby="search-heading">
        <div class="controller-motif" aria-hidden="true">
          <div class="turntable">
            <span class="turntable-core"></span>
          </div>
          <div class="key-cluster">
            <span class="key key-white key-white-1"></span>
            <span class="key key-white key-white-2"></span>
            <span class="key key-white key-white-3"></span>
            <span class="key key-white key-white-4"></span>
            <span class="key key-black key-black-1"></span>
            <span class="key key-black key-black-2"></span>
            <span class="key key-black key-black-3"></span>
          </div>
        </div>

        <div class="search-panel-header">
          <span class="panel-label">Infinitas Console</span>
          <h2 id="search-heading">Search Charts</h2>
        </div>

        <form id="search-form" onsubmit="return false;">
          <div class="search-grid">
            <div class="search-field">
              <label for="title">Title</label>
              <input
                type="text"
                id="title"
                name="title"
                placeholder="Search by title..."
              />
            </div>
            <div class="search-field">
              <label for="artist">Artist</label>
              <input
                type="text"
                id="artist"
                name="artist"
                placeholder="Search by artist..."
              />
            </div>
            <div class="search-field">
              <label for="genre">Genre</label>
              <input
                type="text"
                id="genre"
                name="genre"
                placeholder="Search by genre..."
              />
            </div>
            <div class="search-field">
              <label for="difficulty">Difficulty</label>
              <select id="difficulty" name="difficulty">
                <option value="">All</option>
                <option value="Beginner">Beginner</option>
                <option value="Standard">Standard</option>
                <option value="Hyper">Hyper</option>
                <option value="Another">Another</option>
                <option value="Leggendaria">Leggendaria</option>
              </select>
            </div>
            <div class="search-field">
              <label for="level">Level</label>
              <select id="level" name="level">
                <option value="">All</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
                <option value="11">11</option>
                <option value="12">12</option>
              </select>
            </div>
            <div class="search-field">
              <label for="chart_type">Type</label>
              <select id="chart_type" name="type">
                <option value="">All</option>
                <option value="Single">Single</option>
                <option value="Double">Double</option>
              </select>
            </div>
            <div class="search-field">
              <label for="order">Order By</label>
              <select id="order" name="order">
                <option value="title">Title</option>
                <option value="level">Level</option>
                <option value="BPM">BPM</option>
                <option value="note">Note Count</option>
              </select>
            </div>
            <div class="search-actions">
              <button
                type="button"
                id="sort-direction"
                class="sort-toggle"
                data-direction="asc"
                aria-label="Sort ascending"
              >
                ↑ First
              </button>
              <button type="button" id="search" class="search-button">Search</button>
            </div>
          </div>
        </form>
      </section>

      <div id="meta-bar">
        <span class="last-updated">Last updated: 2025-11-14</span>
      </div>

      <section id="results-section" aria-live="polite">
        <div id="results"></div>
      </section>

      <nav id="navigation" aria-label="Search results navigation">
        <button id="firstPage" disabled type="button">&lt;&lt;</button>
        <button id="prevPage" disabled type="button">&lt;</button>
        <span id="page-info">
          Showing songs <span id="firstOffset">1</span> to
          <span id="lastOffset">50</span> of <span id="totalCount">500</span>
        </span>
        <button id="nextPage" disabled type="button">&gt;</button>
        <button id="lastPage" disabled type="button">&gt;&gt;</button>
      </nav>
    </div>
  </body>
</html>
